<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-wrap {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .box {
            padding: 30px;
            border-radius: 20px;
            background-color: tomato;
            text-align: center;
            color: #fff;
            font-size: 25px;
            font-weight: 800;
        }

        .gallery {
            margin-top: 20px;
            display: grid;
            gap: 30px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .gallery img {
            width: 100%;
            border-radius: 20px;
            height: 200px;
            object-fit: cover;
            transition: all 0.8s;
        }

        .gallery img:hover {
            transform: translateY(-10px);
            transition: all 0.8s;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box-wrap">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
        <div class="gallery">

            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Image 1" width="300">
            <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" alt="Image 2" width="300">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Image 3" width="300">

            <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" alt="Image 4" width="300">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" alt="Image 5" width="300">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Image 6" width="300">

            <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429" alt="Image 7" width="300">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Image 8" width="300">
            <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Image 9" width="300">

        </div>
    </div>
</body>

</html>
