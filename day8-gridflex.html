<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 8</title>
    <style>
        body {
            /* background-color: #000; */
            box-sizing: border-box;
            margin: 0;
        }

        .nav {
            padding: 0 20px;
            /* border-radius: 20px; */
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgb(178, 179, 182);
            color: #fff;
        }

        .middle {
            display: grid;
            grid-template-columns: 10% 90%;
            gap: 20px;
            height: 100vh;
        }

        .sidebar,
        .content {
            padding: 0 30px;
        }

        .sidebar {
            background-color: rgb(53, 82, 212);
            color: #fff;
        }



        ul {
            display: flex;
            justify-content: start;
            flex-direction: column;
            gap: 20px;
            list-style: none;
            padding: 0;
        }


        .card-conainer {
            padding: 20px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            text-align: center;
            border-radius: 20px;
            flex: 1 1 200px;
            padding: 20px;
            background-color: #f5f5f5;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
            transition: 0.5s ease;
        }

        .card:hover {
            /* transition: 0.3s ease-in-out; */
            color: #f5f5f5;
            transform: translateY(-10px);
            background: linear-gradient(#f46b45 50%, #eea849 100%);
            box-shadow: 5px 5px 15px #d39f91;

        }

        .btn {
            background: linear-gradient(45deg, rgb(228, 174, 75), rgb(236, 108, 108));
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .footer {
            padding: 20px;
            color: #fff;
            background-color: #000;
        }

        .wrapeer {
            width: 80%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="section">
        <div class="header">
            <nav class="nav">
                <h3>Logo</h3>
                <!-- <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Services</li>
                    <li>Contact Us</li>
                </ul> -->
            </nav>

        </div>
        <div class="middle">
            <div class="sidebar">
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Services</li>
                    <li>Contact Us</li>
                </ul>
            </div>
            <div class="content">
                <h1>This is header of Website</h1>
                <div class="card-conainer">
                    <div class="card">
                        <h1>Basic</h1>
                        <h4>10$</h4>
                        <p>for 1 month</p>
                        <button class="btn">Subscribe</button>
                    </div>
                    <div class="card">
                        <h1>Standard</h1>
                        <h4>10$</h4>
                        <p>for 1 month</p>
                        <button class="btn">Subscribe</button>
                    </div>
                    <div class="card">
                        <h1>Pro</h1>
                        <h4>10$</h4>
                        <p>for 1 month</p>
                        <button class="btn">Subscribe</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="wrapeer">
                <h3>© 2025 The Business Innovations. All Rights Reserved.</h3>
            </div>
        </div>
    </div>
</body>

</html>
