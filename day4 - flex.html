<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4</title>
    <style>
        .card-conainer {
            padding: 20px;
            margin-top: 200px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            text-align: center;
            border-radius: 20px;
            flex: 1 1 200px;
            padding: 20px;
            background-color: #f5f5f5;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.5s ease;

        }

        .card:hover {
            transition: 0.5s ease-in-out;
            transform: translateY(-10px);
            background: linear-gradient(#f46b45 50%, #eea849 100%);
            color: #f5f5f5;
            box-shadow: 5px 5px 15px #d39f91;

        }

        .btn {
            background: linear-gradient(45deg, rgb(228, 174, 75), rgb(236, 108, 108));
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card-conainer">
        <div class="card">
            <h1>Basic</h1>
            <h4>10$</h4>
            <p>for 1 month</p>
            <button class="btn">Subscribe</button>
        </div>
        <div class="card">
            <h1>Standard</h1>
            <h4>10$</h4>
            <p>for 1 month</p>
            <button class="btn">Subscribe</button>
        </div>
        <div class="card">
            <h1>Pro</h1>
            <h4>10$</h4>
            <p>for 1 month</p>
            <button class="btn">Subscribe</button>
        </div>
        <div class="card">
            <h1>Pro-Max</h1>
            <h4>10$</h4>
            <p>for 1 month</p>
            <button class="btn">Subscribe</button>
        </div>
        <div class="card">
            <h1>Ultra-Pro Max</h1>
            <h4>10$</h4>
            <p>for 1 month</p>
            <button class="btn">Subscribe</button>
        </div>
    </div>
</body>

</html>
